<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Northeastern Electric — Field App</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f5f7;
}

header{
background:#1e56c9;
color:white;
padding:14px 20px;
font-weight:bold;
}

.container{
padding:20px;
}

.search{
margin-bottom:15px;
}

.job{
background:white;
padding:12px;
border-radius:6px;
margin-bottom:8px;
box-shadow:0 1px 3px rgba(0,0,0,.1);
}

</style>
</head>

<body>

<header>
Northeastern Electric — Field App
</header>

<div class="container">

<div class="search">
<input id="search" placeholder="Search by job name..." style="padding:8px;width:260px">
<button onclick="loadJobs()">Refresh</button>
</div>

<div id="jobs"></div>

</div>

<script>

const JOB_TABLE = "tblfphTqRzN24qmZS"

async function loadJobs(){

const container = document.getElementById("jobs")
container.innerHTML = "Loading..."

try{

const res = await fetch(`/.netlify/functions/airtable?tableId=${JOB_TABLE}`)
const data = await res.json()

if(!data.records){
container.innerHTML = "Could not load jobs."
console.log(data)
return
}

renderJobs(data.records)

}catch(e){

container.innerHTML = "Error loading jobs."
console.error(e)

}

}

function renderJobs(records){

const container = document.getElementById("jobs")
const search = document.getElementById("search").value.toLowerCase()

container.innerHTML = ""

records
.filter(r => !search || (r.fields["Job Name"] || "").toLowerCase().includes(search))
.forEach(r=>{

const div = document.createElement("div")
div.className="job"

div.innerHTML = `
<b>${r.fields["Job Name"] || "Unnamed Job"}</b><br>
PO: ${r.fields["Job PO"] || ""}<br>
Status: ${r.fields["Job Status"] || ""}<br>
Contractor: ${r.fields["Contractor Name"] || ""}
`

container.appendChild(div)

})

}

loadJobs()

</script>

</body>
</html>
