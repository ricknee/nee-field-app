<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Northeastern Electric — Field App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#1A56DB;--blue-light:#EBF5FF;--blue-mid:#3B82F6;
    --yellow-light:#FEF3C7;--green-light:#D1FAE5;--purple-light:#EDE9FE;
    --gray:#6B7280;--gray-light:#F9FAFB;--gray-border:#E5E7EB;
    --text:#111827;--text-mid:#374151;--text-soft:#6B7280;
    --surface:#FFFFFF;--bg:#F3F4F6;--radius:10px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

  /* TOPBAR */
  .topbar{background:var(--blue);color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
  .topbar-logo{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .topbar-logo svg{width:18px;height:18px}
  .topbar-title{font-size:15px;font-weight:600}
  .topbar-sub{font-size:12px;opacity:.7;margin-top:1px}
  .topbar-back{background:none;border:none;color:#fff;cursor:pointer;font-size:22px;line-height:1;padding:4px;margin-right:4px;opacity:.85}

  /* SEARCH */
  .search-wrap{padding:12px 16px 8px;background:var(--surface);border-bottom:1px solid var(--gray-border);position:sticky;top:56px;z-index:90}
  .search-row{display:flex;gap:8px}
  .search-field-wrap{position:relative;flex:1}
  .search-input{width:100%;background:var(--bg);border:1.5px solid var(--gray-border);border-radius:var(--radius-sm);padding:8px 12px 8px 36px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);transition:border-color .15s}
  .search-input:focus{outline:none;border-color:var(--blue-mid)}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-soft);pointer-events:none}
  .filter-select{background:var(--bg);border:1.5px solid var(--gray-border);border-radius:var(--radius-sm);padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);cursor:pointer}
  .filter-select:focus{outline:none;border-color:var(--blue-mid)}
  .year-row{display:none;margin-top:8px;align-items:center;gap:8px;flex-wrap:wrap}
  .year-row.visible{display:flex}
  .year-label{font-size:12px;color:var(--text-soft);white-space:nowrap}
  .year-chips{display:flex;gap:6px;flex-wrap:wrap}
  .year-chip{background:var(--bg);border:1.5px solid var(--gray-border);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--text-soft);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
  .year-chip:hover{border-color:var(--blue-mid);color:var(--blue)}
  .year-chip.active{background:var(--blue);border-color:var(--blue);color:#fff}
  .results-meta{font-size:12px;color:var(--text-soft);padding:6px 0 2px}

  /* LIST */
  .refresh-row{display:flex;justify-content:flex-end;padding:8px 16px 0}
  .refresh-btn{background:none;border:1px solid var(--gray-border);border-radius:99px;padding:4px 12px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-soft);cursor:pointer;display:flex;align-items:center;gap:5px}
  .refresh-btn:hover{background:var(--gray-light)}
  .list-wrap{padding:12px 16px 32px}
  .job-card{background:var(--surface);border:1px solid var(--gray-border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;-webkit-user-select:none}
  .job-card:active{transform:scale(.99)}
  .job-card:hover{border-color:#C0CBDB;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .card-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
  .card-year{font-size:11px;color:var(--text-soft);margin-left:6px;font-weight:400}
  .card-po{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-soft);margin-top:3px;letter-spacing:.02em}
  .card-addr{display:flex;align-items:flex-start;gap:5px;font-size:12px;color:var(--text-soft);margin-top:9px}
  .card-notes{font-size:12px;color:var(--text-mid);background:var(--gray-light);border-radius:var(--radius-sm);padding:6px 9px;margin-top:8px;border-left:3px solid var(--gray-border)}
  .gen-chip{display:inline-flex;align-items:center;gap:4px;background:#D1FAE5;color:#065F46;font-size:11px;font-weight:500;padding:2px 7px;border-radius:99px;margin-top:7px}

  /* BADGES */
  .badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0}
  .badge-completed{background:var(--green-light);color:#065F46}
  .badge-awarded{background:#CFFAFE;color:#155E75}
  .badge-inprogress{background:var(--yellow-light);color:#92400E}
  .badge-estimating{background:var(--blue-light);color:#1E40AF}
  .badge-newlead{background:var(--purple-light);color:#5B21B6}
  .badge-servicecall{background:#FEF3C7;color:#92400E}
  .badge-passed{background:var(--green-light);color:#065F46}
  .badge-scheduled{background:var(--blue-light);color:#1E40AF}
  .badge-failed{background:#FEE2E2;color:#991B1B}
  .badge-temp{background:#FEF3C7;color:#92400E}
  .badge-rough{background:#DBEAFE;color:#1E40AF}
  .badge-final{background:#D1FAE5;color:#065F46}
  .badge-overdue{background:#FEE2E2;color:#991B1B}
  .badge-active{background:var(--green-light);color:#065F46}
  .badge-default{background:var(--gray-light);color:var(--gray);border:1px solid var(--gray-border)}

  /* DETAIL */
  #detailView{display:none}
  #detailView.open{display:block}
  #listView.hidden{display:none}
  .detail-hero{background:var(--surface);padding:20px 16px 16px;border-bottom:1px solid var(--gray-border)}
  .detail-name{font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px}
  .detail-po{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-soft);margin-bottom:12px;letter-spacing:.03em}
  .detail-badge-row{display:flex;gap:8px;flex-wrap:wrap}

  /* TABS */
  .tab-bar{background:var(--surface);border-bottom:1px solid var(--gray-border);display:flex;padding:0 8px;position:sticky;top:56px;z-index:90;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab-bar::-webkit-scrollbar{display:none}
  .tab-btn{background:none;border:none;padding:12px 11px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text-soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap;flex-shrink:0}
  .tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
  .tab-content{display:none;padding:16px}
  .tab-content.active{display:block}

  /* INFO CARDS */
  .info-card{background:var(--surface);border:1px solid var(--gray-border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
  .info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 14px;border-bottom:1px solid var(--gray-border);gap:12px;font-size:14px}
  .info-row:last-child{border-bottom:none}
  .info-label{color:var(--text-soft);flex-shrink:0;min-width:100px}
  .info-value{color:var(--text);text-align:right;word-break:break-word}
  .info-value a{color:var(--blue);text-decoration:none}
  .section-head{font-size:11px;font-weight:600;color:var(--text-soft);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;margin-top:4px}

  /* ITEM CARDS */
  .item-card{background:var(--surface);border:1px solid var(--gray-border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
  .item-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px}
  .item-meta{font-size:12px;color:var(--text-soft);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .item-notes{font-size:12px;color:var(--text-mid);margin-top:7px;background:var(--gray-light);border-radius:5px;padding:5px 8px}
  .dot{width:3px;height:3px;border-radius:50%;background:var(--gray-border)}

  /* FORMS */
  .form-card{background:var(--surface);border:1px solid var(--gray-border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .form-group{margin-bottom:14px}
  .form-label{display:block;font-size:12px;font-weight:500;color:var(--text-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
  .form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:1.5px solid var(--gray-border);border-radius:var(--radius-sm);padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);transition:border-color .15s}
  .form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--blue-mid)}
  .form-textarea{min-height:80px;resize:vertical}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .submit-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .15s}
  .submit-btn:hover{opacity:.9}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed}
  .success-msg{background:var(--green-light);color:#065F46;border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-weight:500;text-align:center;margin-bottom:12px;display:none}
  .success-msg.visible{display:block}
  .error-msg{background:#FEE2E2;color:#991B1B;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:10px;display:none}
  .error-msg.visible{display:block}

  /* GEN TAB TOGGLE */
  .gen-toggle{display:flex;gap:6px;margin-bottom:14px;background:var(--bg);border-radius:var(--radius-sm);padding:3px}
  .gen-toggle-btn{flex:1;background:none;border:none;border-radius:5px;padding:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-soft);cursor:pointer;transition:all .15s}
  .gen-toggle-btn.active{background:var(--surface);color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.1)}

  /* LOADING/EMPTY */
  .empty{text-align:center;padding:40px 20px;color:var(--text-soft);font-size:14px}
  .empty-icon{font-size:32px;margin-bottom:10px}
  .loading{text-align:center;padding:40px 20px;color:var(--text-soft);font-size:14px}
  .spinner{width:22px;height:22px;border:2px solid var(--gray-border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ACTION BUTTONS */
  .maps-btn{display:inline-flex;align-items:center;gap:5px;background:var(--blue-light);color:var(--blue);border:none;border-radius:var(--radius-sm);padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;margin-top:4px}
  .call-btn{display:inline-flex;align-items:center;gap:5px;background:#D1FAE5;color:#065F46;border:none;border-radius:var(--radius-sm);padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;margin-top:4px}
  .link-btn{display:inline-flex;align-items:center;gap:5px;background:var(--purple-light);color:#5B21B6;border:none;border-radius:var(--radius-sm);padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;margin-top:4px}

  @media(min-width:600px){
    .list-wrap,.detail-wrap{max-width:600px;margin:0 auto}
    .search-wrap{padding:12px 0 8px}
    .search-wrap>*{max-width:600px;margin:0 auto}
  }
</style>
</head>
<body>


<!-- PIN SCREEN -->
<div id="pinScreen" style="display:none;position:fixed;inset:0;background:#1A56DB;z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:20px">
  <div style="background:white;border-radius:16px;padding:32px 28px;width:100%;max-width:320px;text-align:center">
    <div style="width:56px;height:56px;background:#EBF5FF;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg width="28" height="28" viewBox="0 0 20 20" fill="none"><path d="M10 2L3 7v11h14V7L10 2z" stroke="#1A56DB" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 6l2.5 4H12v4H8v-4h-.5L10 6z" fill="#1A56DB"/></svg>
    </div>
    <div style="font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;color:#111827;margin-bottom:4px">Northeastern Electric</div>
    <div style="font-family:'DM Sans',sans-serif;font-size:13px;color:#6B7280;margin-bottom:24px">Enter your PIN to continue</div>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••"
      onkeyup="pinKey(event)"
      style="width:100%;text-align:center;font-size:28px;letter-spacing:12px;padding:12px;border:2px solid #E5E7EB;border-radius:8px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;color:#111827"/>
    <div id="pinError" style="display:none;background:#FEE2E2;color:#991B1B;border-radius:6px;padding:8px;font-size:13px;margin-bottom:12px;font-family:'DM Sans',sans-serif">Incorrect PIN — try again.</div>
    <button onclick="checkPin()" style="width:100%;background:#1A56DB;color:white;border:none;border-radius:8px;padding:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer">Unlock</button>
  </div>
</div>

<!-- APP CONTENT -->
<div id="appContent" style="display:none">
<!-- LIST VIEW -->
<div id="listView">
  <div class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 7v11h14V7L10 2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 6l2.5 4H12v4H8v-4h-.5L10 6z" fill="white"/></svg>
    </div>
    <div style="flex:1">
      <div class="topbar-title">Northeastern Electric</div>
      <div class="topbar-sub">Field job lookup</div>
    </div>
    <button onclick="employeeLogout()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">Logout</button>
  </div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="search-field-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input class="search-input" type="search" id="searchInput" placeholder="Search by job name…" oninput="filterJobs()" autocomplete="off"/>
      </div>
      <select class="filter-select" id="statusFilter" onchange="onStatusChange()">
        <option value="">All statuses</option>
        <option value="Awarded">Awarded</option>
        <option value="Estimating">Estimating</option>
        <option value="New Lead">New Lead</option>
        <option value="Completed">Completed</option>
      <option value="Service Call Scheduled">Service Call Scheduled</option>
      </select>
    </div>
    <div class="year-row" id="yearRow">
      <span class="year-label">Year:</span>
      <div class="year-chips" id="yearChips"></div>
    </div>
    <div class="results-meta" id="resultsMeta"></div>
  </div>
  <div class="refresh-row">
    <button class="refresh-btn" onclick="reloadJobs()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10 6a4 4 0 1 1-1.17-2.83" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 2l1 2-2 .5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh
    </button>
  </div>
  <div class="list-wrap" id="jobsList">
    <div class="loading"><div class="spinner"></div>Loading jobs…</div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="detailView">
  <div class="topbar">
    <button class="topbar-back" onclick="closeDetail()">&#8592;</button>
    <div>
      <div class="topbar-title" id="dTopbarTitle">Job details</div>
      <div class="topbar-sub" id="dTopbarPo"></div>
    </div>
  </div>
  <div class="detail-wrap">
    <div class="detail-hero">
      <div class="detail-name" id="dName"></div>
      <div class="detail-po" id="dPo"></div>
      <div class="detail-badge-row" id="dBadges"></div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showTab('info',this)">Job info</button>
      <button class="tab-btn" onclick="showTab('power',this)">Power Co.</button>
      <button class="tab-btn" onclick="showTab('schedule',this)">Schedule Insp.</button>
      <button class="tab-btn" onclick="showTab('report',this)">Report Insp.</button>
      <button class="tab-btn" id="genTabBtn" onclick="showTab('generator',this)" style="display:none">Generator</button>
    </div>
    <div class="tab-content active" id="tabInfo"></div>
    <div class="tab-content" id="tabPower"></div>
    <div class="tab-content" id="tabSchedule"></div>
    <div class="tab-content" id="tabReport"></div>
    <div class="tab-content" id="tabGenerator"></div>
  </div>
</div>

<script>
const BASE_ID        = 'appiqWg6SvKcGfMAu';
const JOBS_TABLE     = 'tblfphTqRzN24qmZS';
const INSPECT_TABLE  = 'tblTbd2bfab4Ce8n9';
const GEN_TABLE      = 'tbltrxCj8k5WyWT6s';

const API_PROXY = '/.netlify/functions/airtable';

let allJobs=[], currentJob=null, selectedYear='';
let inspectCache={}, genCache={};

async function fetchAirtable(tableId, fields, filterFormula, recordIdOrPageSize) {
  const params = new URLSearchParams({ tableId });
  if (fields && fields.length) fields.forEach(f => params.append('fields[]', f));
  if (filterFormula) params.set('filterByFormula', filterFormula);
  if (typeof recordIdOrPageSize === 'string' && recordIdOrPageSize.startsWith('rec')) {
    params.set('recordId', recordIdOrPageSize);
  } else {
    params.set('pageSize', String(typeof recordIdOrPageSize === 'number' ? recordIdOrPageSize : 100));
  }
  const res = await fetch(`${API_PROXY}?${params.toString()}`, { credentials: 'include' });
  if (!res.ok) {
    let msg = 'API error ' + res.status;
    try { const j = await res.json(); msg = j.error || j.message || msg; } catch (e) {}
    throw new Error(msg);
  }
  const json = await res.json();
  if (params.get('recordId')) return json.fields ? [json] : [];
  return json.records || [];
}

async function patchAirtable(tableId, recordId, fields) {
  const res = await fetch(API_PROXY, {
    method: 'PATCH',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tableId, recordId, fields })
  });
  if (!res.ok) {
    let msg = 'Patch error ' + res.status;
    try { const j = await res.json(); msg = j.error || j.message || msg; } catch (e) {}
    throw new Error(msg);
  }
  return res.json();
}

async function createAirtable(tableId, fields) {
  const res = await fetch(API_PROXY, {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tableId, fields })
  });
  if (!res.ok) {
    let msg = 'Create error ' + res.status;
    try { const j = await res.json(); msg = j.error || j.message || msg; } catch (e) {}
    throw new Error(msg);
  }
  return res.json();
}

async function createAirtable(tableId, fields) {
  const res=await fetch(`https://api.airtable.com/v0/${BASE_ID}/${tableId}`,{
    method:'POST',
    headers:{Authorization:`Bearer ${API_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify({fields})
  });
  if(!res.ok){
    let msg='Create error '+res.status;
    try{const j=await res.json();msg=j.error?.message||j.error?.type||msg;}catch(e){}
    throw new Error(msg);
  }
  return res.json();
}

/* ── LOAD JOBS ── */
async function loadJobs() {
  document.getElementById('jobsList').innerHTML='<div class="loading"><div class="spinner"></div>Loading jobs…</div>';
  try {
    const records=await fetchAirtable(JOBS_TABLE,[
      'Job Name','Job PO','Job Status','Job Type',
      'Job Address - Full','Notes','Start Date','Permit Number',
      'Worklfow Status','Job Year','Generator Installed',
      'AIC Number','Temporary Work Order #','Permanent Work Order #',
      'Power Company – Name (lookup)','Power Company – Primary Contact (lookup)',
      'Power Company – Phone (lookup)','Power Company – Email (lookup)',
      'Inspection Agency Phone #','Inspection Agency Email Address','Inspection Scheduling Link',
      'Installed Generator',
      'Wire (Mobile) or THHN (Mobile)','Add Pipe (Mobile)','Add Photos (Mobile)',
      'View pCloud Photos','Trello Card ID','Trello Card PO ID'
    ]);
    allJobs=records.map(r=>{
      const f=r.fields;
      const installedGen=f['Installed Generator'];
      let genId=null; if(Array.isArray(installedGen)&&installedGen.length){genId=installedGen[0].id||installedGen[0]||null;} else if(installedGen&&typeof installedGen==="object"&&installedGen.linkedRecordIds){genId=installedGen.linkedRecordIds[0]||null;}
      return {
        id:String(r.id),
        jobName:    f['Job Name']||'',
        jobPO:      f['Job PO']||'',
        status:     f['Job Status']||'',
        jobType:    f['Job Type']||'',
        address:    f['Job Address - Full']||'',
        notes:      f['Notes']||'',

        permWO:     f['Permanent Work Order #']||'',
        pcName:     flatten(f['Power Company – Name (lookup)']),
        pcContact:  flatten(f['Power Company – Primary Contact (lookup)']),
        pcPhone:    flatten(f['Power Company – Phone (lookup)']),
        pcEmail:    flatten(f['Power Company – Email (lookup)']),
        iaPhone:    flatten(f['Inspection Agency Phone #']),
        iaEmail:    flatten(f['Inspection Agency Email Address']),
        iaScheduleLink: flatten(f['Inspection Scheduling Link']),
        wireLink:       extractUrl(f['Wire (Mobile) or THHN (Mobile)']),
        pipeLink:       extractUrl(f['Add Pipe (Mobile)']),
        addPhotoLink:   extractUrl(f['Add Photos (Mobile)']),
        viewPhotoLink:  extractUrl(f['View pCloud Photos']),
        trelloCardId:   f['Trello Card ID']||'',
        trelloCardPoId: f['Trello Card PO ID']||''
      };
    });
    buildYearChips();
    filterJobs();
  } catch(e) {
    document.getElementById('jobsList').innerHTML=
      '<div class="empty"><div class="empty-icon">⚠️</div>Could not load jobs.<br>Check your API key or connection.</div>';
    console.error(e);
  }
}

function flatten(val) {
  if(!val) return '';
  if(typeof val==='string') return val;
  if(Array.isArray(val)) return val.map(v=>typeof v==='object'?(v.name||String(v)):String(v)).join(', ');
  if(typeof val==='object'&&val.linkedRecordIds) {
    const vals=Object.values(val.valuesByLinkedRecordId||{}).flat();
    return vals.map(v=>typeof v==='object'?(v.name||String(v)):String(v)).join(', ');
  }
  return String(val);
}

/* ── YEAR CHIPS ── */
function buildYearChips(){
  const years=[...new Set(allJobs.filter(j=>(j.status||'').toLowerCase()==='completed'&&j.jobYear).map(j=>j.jobYear))].sort((a,b)=>b-a);
  document.getElementById('yearChips').innerHTML=
    `<button class="year-chip active" onclick="selectYear('',this)">All years</button>`+
    years.map(y=>`<button class="year-chip" onclick="selectYear('${y}',this)">${y}</button>`).join('');
}
function selectYear(y,btn){selectedYear=y;document.querySelectorAll('.year-chip').forEach(c=>c.classList.remove('active'));btn.classList.add('active');filterJobs()}
function onStatusChange(){
  selectedYear='';
  const isC=document.getElementById('statusFilter').value==='Completed';
  document.getElementById('yearRow').classList.toggle('visible',isC);
  if(isC){document.querySelectorAll('.year-chip').forEach(c=>c.classList.remove('active'));const f=document.querySelector('.year-chip');if(f)f.classList.add('active')}
  filterJobs();
}

/* ── FILTER & RENDER LIST ── */
function filterJobs(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const s=document.getElementById('statusFilter').value.toLowerCase();
  const filtered=allJobs.filter(j=>{
    const mQ=!q||j.jobName.toLowerCase().includes(q)||j.jobPO.toLowerCase().includes(q);
    const mS=!s||(j.status||'').toLowerCase()===s;
    const mY=!selectedYear||j.jobYear===selectedYear;
    return mQ&&mS&&mY;
  }).sort((a,b)=>{
    if((a.status||'').toLowerCase()==='completed'&&(b.status||'').toLowerCase()==='completed'&&a.jobYear!==b.jobYear)
      return (b.jobYear||'')>(a.jobYear||'')?1:-1;
    return a.jobName.localeCompare(b.jobName);
  });
  document.getElementById('resultsMeta').textContent=filtered.length+' job'+(filtered.length!==1?'s':'');
  const list=document.getElementById('jobsList');
  if(!filtered.length){list.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>No jobs match.</div>';return}
  list.innerHTML=filtered.map(j=>{
    const addr=cleanAddr(j.address);
    const addrOk=addr&&addr!=='OH'&&addr.length>4;
    const isC=(j.status||'').toLowerCase()==='completed';
    return `<div class="job-card" onclick="openDetail('${j.id}')">
      <div class="card-top">
        <div>
          <div class="card-name">${esc(j.jobName||'Unnamed')}${isC&&j.jobYear?`<span class="card-year">${esc(j.jobYear)}</span>`:''}</div>
          <div class="card-po">${esc(j.jobPO)}</div>
        </div>
        <span class="badge ${badgeClass(j.status)}">${esc(j.status||'—')}</span>
      </div>
      ${addrOk?`<div class="card-addr"><span>📍</span><span>${esc(addr)}</span></div>`:''}
      ${j.hasGenerator?`<div class="gen-chip">⚡ Generator installed</div>`:''}
      ${j.notes?`<div class="card-notes">${esc(j.notes)}</div>`:''}
    </div>`;
  }).join('');
}

  document.getElementById('detailView').classList.add('open');

  document.getElementById('dTopbarPo').textContent=j.jobPO||'';

function showTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  const map={info:'tabInfo',power:'tabPower',schedule:'tabSchedule',report:'tabReport',generator:'tabGenerator'};

function populateInspSelector(records){
  const sel=document.getElementById('reportInspSelect');
  if(!sel)return;
  if(!records.length){sel.innerHTML='<option value="">No inspections found</option>';return}
  sel.innerHTML='<option value="">— Select an inspection —</option>'+
    records.map(r=>{
      const f=r.fields;
      const name=flatten(f['Inspection Name'])||flatten(f['Inspection Type'])||'Inspection';
      const status=flatten(f['Inspection Status'])||'';
      return `<option value="${r.id}">${esc(name)}${status?' · '+status:''}</option>`;

}

async function submitReport(){
  const inspId=document.getElementById('reportInspSelect').value;
  const type=document.getElementById('rType').value;
  const date=document.getElementById('rDate').value;
  const status=document.getElementById('rStatus').value;
  const notes=document.getElementById('rNotes').value;
  const errEl=document.getElementById('reportError');
  errEl.classList.remove('visible');

  if(!inspId){errEl.textContent='Please select an inspection first.';errEl.classList.add('visible');return}
  if(!date){errEl.textContent='Please enter an inspection date.';errEl.classList.add('visible');return}

  const btn=document.getElementById('reportSubmitBtn');
  btn.disabled=true;btn.textContent='Saving…';
  try {
    const fields={'fldPblyNOIryMLFB6':date,'fld7kH2SEHsxaS9vz':status,'fldmz5dOw6In5OkU7':notes};
    if(type) fields['fldR2IQkaeRHXytsR']=type;
    await patchAirtable(INSPECT_TABLE,inspId,fields);
    document.getElementById('reportSuccess').classList.add('visible');
    document.getElementById('rNotes').value='';
    document.getElementById('reportInspSelect').value='';

/* ── HELPERS ── */
function badgeClass(s){
  const m={'completed':'badge-completed','awarded':'badge-awarded','in progress':'badge-inprogress','estimating':'badge-estimating','new lead':'badge-newlead','service call scheduled':'badge-servicecall','ready to invoice':'badge-readytoinvoice'};
  return m[(s||'').toLowerCase()]||'badge-default';
}
function cleanAddr(a){return(a||'').replace(/,\s*,/g,',').replace(/,\s*OH\s*,\s*OH/g,', OH').replace(/^\s*,\s*/,'').replace(/,\s*$/,'').trim()}
function extractUrl(val){
  if(!val) return '';
  const str=flatten(val);
  const match=str.match(/https?:\/\/[^\s]+/);
  return match?match[0].trim():'';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(d){if(!d)return'';try{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch(e){return d}}


let currentMode='';

async function apiLogin(pin){
  const res = await fetch('/.netlify/functions/auth', {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pin })
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || 'Login failed');
  return json;
}

async function apiSession(){
  const res = await fetch('/.netlify/functions/auth', { credentials: 'include' });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) return { authenticated:false };
  return json;
}

async function apiLogout(){
  await fetch('/.netlify/functions/auth', { method: 'DELETE', credentials: 'include' }).catch(()=>null);
}

async function checkPin(){
  const input=document.getElementById('pinInput');
  const v=input.value.trim();
  const e=document.getElementById('pinError');
  if(!v){
    e.textContent='Enter your PIN.';
    e.style.display='block';
    return;
  }
  try {
    const data = await apiLogin(v);
    currentMode=data.role;
    showApp(data.role);
  } catch(err) {
    e.textContent='Incorrect PIN — try again.';
    e.style.display='block';
    input.value='';
    input.focus();
    setTimeout(()=>e.style.display='none',2000);
  }
}

function showApp(mode){
  document.getElementById('pinScreen').style.display='none';
  currentMode=mode;
  if(mode==='admin'){
    document.getElementById('appContent').style.display='none';
    document.getElementById('adminContent').style.display='';
    loadAdminJobs();
  } else {
    document.getElementById('appContent').style.display='';
    document.getElementById('adminContent').style.display='none';
    loadJobs();
  }
}

function pinKey(e){if(e.key==='Enter')checkPin()}

async function bootAuth(){
  const session = await apiSession();
  if(session && session.authenticated && (session.role==='employee' || session.role==='admin')){
    showApp(session.role);
  } else {
    document.getElementById('pinScreen').style.display='flex';
    document.getElementById('appContent').style.display='none';
    document.getElementById('adminContent').style.display='none';
    setTimeout(()=>document.getElementById('pinInput').focus(),200);
  }
}
bootAuth();

function filterAdminSel(selId, q){
  const sel=document.getElementById(selId);
  if(!sel) return;
  const lq=q.toLowerCase();
  const statusSel=document.getElementById(selId.replace('-sel','-status'));
  const sv=statusSel?statusSel.value.toLowerCase():'';
  for(let i=1;i<sel.options.length;i++){
    const matchQ=!lq||sel.options[i].text.toLowerCase().includes(lq);
    const matchS=!sv||sel.options[i].dataset.status===sv;
    sel.options[i].style.display=(matchQ&&matchS)?'':'none';
  }
}

function filterAdminSelByStatus(containerId){
  const sel=document.getElementById(containerId+'-sel');
  const statusSel=document.getElementById(containerId+'-status');
  if(!sel||!statusSel) return;
  const sv=statusSel.value.toLowerCase();
  const searchInput=document.querySelector(`#${containerId} input[type=search]`);
  const lq=searchInput?searchInput.value.toLowerCase():'';
  for(let i=1;i<sel.options.length;i++){
    const matchQ=!lq||sel.options[i].text.toLowerCase().includes(lq);
    const matchS=!sv||sel.options[i].dataset.status===sv;
    sel.options[i].style.display=(matchQ&&matchS)?'':'none';
  }
}

async function loadEstimates(jobId){
  const el=document.getElementById('estList');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Loading estimates...</div>';
  const job=adminJobs.find(j=>j.id===jobId);
  if(!job){el.innerHTML='<div class="empty">Job not found.</div>';return}
  try {
    const records=await fetchAirtable(ESTIMATES_TABLE,
      ['Estimate Name','Estimate Type','Status','Estimate Date','Estimated Labor Hours',
       'Estimated Labor Cost','Estimated Material Cost','Calculated Estimated Total',
       'Actual Estimate Sent','Notes'],
      `{Job}='${job.jobName}'`);
    if(!records.length){
      el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>No estimates yet. Click "+ New estimate" above.</div>';
      return;
    }
    el.innerHTML=records.map(r=>{
      const f=r.fields;
      const type=flatten(f['Estimate Type'])||'';
      const status=flatten(f['Status'])||'';
      const sent=f['Actual Estimate Sent']?'$'+Number(f['Actual Estimate Sent']).toLocaleString():'—';
      const calc=f['Calculated Estimated Total']?'$'+Number(f['Calculated Estimated Total']).toLocaleString():'—';
      return `<div class="item-card" style="cursor:pointer" onclick="showEstForm('${r.id}','${esc(type)}','${esc(status)}','${f['Estimate Date']||''}','${f['Estimated Labor Hours']||''}','${f['Estimated Material Cost']||''}','${f['Actual Estimate Sent']||''}','${esc(flatten(f['Notes'])||'')}')">
        <div class="item-name">${esc(flatten(f['Estimate Name'])||type)}</div>
        <div class="item-meta">
          ${type?`<span class="badge badge-default">${esc(type)}</span>`:''}
          ${status?`<span class="badge badge-default">${esc(status)}</span>`:''}
          ${f['Estimate Date']?`<span class="dot"></span><span>${fmtDate(f['Estimate Date'])}</span>`:''}
        </div>
        <div style="font-size:12px;color:var(--text-soft);margin-top:6px;display:flex;gap:12px">
          <span>Calc: ${calc}</span><span>Sent: ${sent}</span>
          ${f['Estimated Labor Hours']?`<span>Labor hrs: ${f['Estimated Labor Hours']}</span>`:''}
        </div>
        ${f['Notes']?`<div class="item-notes">${esc(flatten(f['Notes']))}</div>`:''}
      </div>`;
    }).join('');
  } catch(e){el.innerHTML='<div class="empty">Could not load estimates.</div>'}
}

function showEstForm(recordId, type, status, date, laborHrs, materialCost, actualSent, notes){
  const f=document.getElementById('estForm');
  f.style.display='';
  document.getElementById('eRecordId').value=recordId||'';
  document.getElementById('eType').value=type||'Original';
  document.getElementById('eStatus').value=status||'';
  document.getElementById('eDate').value=date||new Date().toISOString().split('T')[0];
  document.getElementById('eLaborHrs').value=laborHrs||'';
  document.getElementById('eMaterialCost').value=materialCost||'';
  document.getElementById('eActualSent').value=actualSent||'';
  document.getElementById('eNotes').value=notes||'';
  f.scrollIntoView({behavior:'smooth'});
}

  const fields={};

  const status=document.getElementById('eStatus').value; if(status&&status!=='') fields['fld9GsGvxaNPuCnjo']=status;
  const date=document.getElementById('eDate').value; if(date) fields['fldgRE3YUR8aMrQY6']=date;

async function onInspJobSelect(jobId){
  const sec=document.getElementById('inspSection');
  if(!jobId){sec.style.display='none';return}
  sec.style.display='';
  const job=adminJobs.find(j=>j.id===jobId);
  if(!job) return;
  try {
    const records=await fetchAirtable(INSPECT_TABLE,
      ['Inspection Name','Inspection Type','Inspection Status','Inspection Date','Notes','Permit Number'],
      `{Job}='${job['Job Name']||job.jobName}'`);
    const sel=document.getElementById('iaInspSelect');
    sel.innerHTML='<option value="">— Select inspection to edit —</option>'+
      records.map(r=>{
        const f=r.fields;
        const name=flatten(f['Inspection Name'])||flatten(f['Inspection Type'])||'Inspection';
        return `<option value="${r.id}" data-type="${flatten(f['Inspection Type'])}" data-status="${flatten(f['Inspection Status'])}" data-date="${flatten(f['Inspection Date'])}" data-notes="${esc(flatten(f['Notes']))}" data-permit="${esc(flatten(f['Permit Number']))}">${esc(name)} · ${flatten(f['Inspection Status'])||'?'}</option>`;
      }).join('');
    sel.onchange=()=>{
      const o=sel.options[sel.selectedIndex];
      if(o.value){
        document.getElementById('iaType').value=o.dataset.type||'';
        document.getElementById('iaStatus').value=o.dataset.status||'Scheduled';
        document.getElementById('iaDate').value=o.dataset.date||'';
        document.getElementById('iaNotes').value=o.dataset.notes||'';
        document.getElementById('iaPermit').value=o.dataset.permit||'';
      }
    };
  } catch(e){console.error(e)}
}

    <div class="section-head">Review status</div>
    <div class="info-card">
      <div class="info-row"><span class="info-label">All materials</span><span class="info-value">${chk(job['All Materials Reviewed?'])}</span></div>
      <div class="info-row"><span class="info-label">All wire</span><span class="info-value">${chk(job['All Wire Reviewed?'])}</span></div>
      <div class="info-row"><span class="info-label">All pipe</span><span class="info-value">${chk(job['All Pipe Reviewed?'])}</span></div>
      <div class="info-row"><span class="info-label">All expenses</span><span class="info-value">${chk(job['All Expenses Reviewed?'])}</span></div>
      <div class="info-row"><span class="info-label">All labor</span><span class="info-value">${chk(job['All Labor Reviewed'])}</span></div>
    </div>
    <div class="section-head">Hours comparison</div>
    <div class="info-card">
      <div class="info-row"><span class="info-label">Est. labor hours</span><span class="info-value">${fmtNum(estHrs)}</span></div>
      <div class="info-row"><span class="info-label">Actual hours</span><span class="info-value">${fmtNum(actHrs)}</span></div>
      <div class="info-row"><span class="info-label">Variance</span><span class="info-value" style="color:${hrsVar>0?'#991B1B':hrsVar<0?'#065F46':'var(--text)'};font-weight:600">${hrsVar>0?'+':''}${fmtNum(hrsVar)} hrs</span></div>
    </div>`;
}

    <div style="border-top:1px solid var(--gray-border)">
      <div style="padding:12px 16px 8px;background:var(--surface);border-bottom:1px solid var(--gray-border);position:sticky;top:112px;z-index:80">
        <div class="search-row" style="max-width:640px;margin:0 auto">
          <div class="search-field-wrap">
            <svg class="search-icon" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

            <option value="">All statuses</option>

async function loadJobsForProjInfo(){
  try {
    const records=await fetchAirtable(JOBS_TABLE,[
      'Job Name','Job PO','Job Status','Job Type',
      'Job Address - Full','Notes','Start Date','Permit Number',
      'Worklfow Status','Job Year','Generator Installed',
      'AIC Number','Temporary Work Order #','Permanent Work Order #',
      'Power Company – Name (lookup)','Power Company – Primary Contact (lookup)',
      'Power Company – Phone (lookup)','Power Company – Email (lookup)',
      'Inspection Agency Phone #','Inspection Agency Email Address','Inspection Scheduling Link',
      'Installed Generator',
      'Wire (Mobile) or THHN (Mobile)','Add Pipe (Mobile)','Add Photos (Mobile)',
      'View pCloud Photos','Trello Card ID','Trello Card PO ID'
    ]);
    allJobs=records.map(r=>{
      const f=r.fields;
      const installedGen=f['Installed Generator'];
      let genId=null;
      if(Array.isArray(installedGen)&&installedGen.length) genId=installedGen[0].id||installedGen[0]||null;
      else if(installedGen&&typeof installedGen==='object'&&installedGen.linkedRecordIds) genId=installedGen.linkedRecordIds[0]||null;
      return {
        id:r.id, jobName:f['Job Name']||'', jobPO:f['Job PO']||'',
        status:(f['Job Status']&&f['Job Status'].name)||f['Job Status']||'',
        jobType:(f['Job Type']&&f['Job Type'].name)||f['Job Type']||'',
        address:f['Job Address - Full']||'', notes:f['Notes']||'',
        startDate:f['Start Date']||'', permitNumber:f['Permit Number']||'',
        workflow:f['Worklfow Status']||'', jobYear:f['Job Year']?String(f['Job Year']):'',
        hasGenerator:!!f['Generator Installed'], installedGenId:genId,
        aicNumber:f['AIC Number']||'', tempWO:f['Temporary Work Order #']||'', permWO:f['Permanent Work Order #']||'',
        pcName:flatten(f['Power Company – Name (lookup)']),
        pcContact:flatten(f['Power Company – Primary Contact (lookup)']),
        pcPhone:flatten(f['Power Company – Phone (lookup)']),
        pcEmail:flatten(f['Power Company – Email (lookup)']),
        iaPhone:flatten(f['Inspection Agency Phone #']),
        iaEmail:flatten(f['Inspection Agency Email Address']),
        iaScheduleLink:flatten(f['Inspection Scheduling Link']),
        wireLink:extractUrl(f['Wire (Mobile) or THHN (Mobile)']),
        pipeLink:extractUrl(f['Add Pipe (Mobile)']),
        addPhotoLink:extractUrl(f['Add Photos (Mobile)']),
        viewPhotoLink:extractUrl(f['View pCloud Photos']),
        trelloCardId:f['Trello Card ID']||'',
        trelloCardPoId:f['Trello Card PO ID']||''
      };
    });
  } catch(e){console.error(e)}
  renderProjInfoList();
}

function filterProjInfo(){renderProjInfoList();}

function renderProjInfoList(){
  const q=(document.getElementById('piSearch')||{}).value||'';
  const s=(document.getElementById('piStatus')||{}).value||'';
  const meta=document.getElementById('piMeta');
  const list=document.getElementById('piList');
  if(!list) return;
  const filtered=allJobs.filter(j=>{
    const mQ=!q||j.jobName.toLowerCase().includes(q.toLowerCase())||j.jobPO.toLowerCase().includes(q.toLowerCase());
    const mS=!s||(j.status||'')=== s;
    return mQ&&mS;
  }).sort((a,b)=>a.jobName.localeCompare(b.jobName));
  if(meta) meta.textContent=filtered.length+' job'+(filtered.length!==1?'s':'');
  if(!filtered.length){list.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>No jobs match.</div>';return}
  list.innerHTML=filtered.map(j=>{
    const addr=cleanAddr(j.address);
    const addrOk=addr&&addr!=='OH'&&addr.length>4;
    const isC=(j.status||'').toLowerCase()==='completed';
    return `<div class="job-card" onclick="openDetailFromAdmin('${j.id}')">
      <div class="card-top">
        <div>
          <div class="card-name">${esc(j.jobName||'Unnamed')}${isC&&j.jobYear?`<span class="card-year">${esc(j.jobYear)}</span>`:''}</div>
          <div class="card-po">${esc(j.jobPO)}</div>
        </div>
        <span class="badge ${badgeClass(j.status)}">${esc(j.status||'—')}</span>
      </div>
      ${addrOk?`<div class="card-addr"><span>📍</span><span>${esc(addr)}</span></div>`:''}
      ${j.hasGenerator?`<div class="gen-chip">⚡ Generator installed</div>`:''}
      ${j.notes?`<div class="card-notes">${esc(j.notes)}</div>`:''}
    </div>`;
  }).join('');
}

function openDetailFromAdmin(id){
  window._adminReturnTab='projinfo';
  document.getElementById('adminContent').style.display='none';
  document.getElementById('appContent').style.display='';
  openDetail(id);
}
