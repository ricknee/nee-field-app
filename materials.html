<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEE Materials</title>
<style>
  :root {
    --gold: #E8A020;
    --gold-dark: #B87D10;
    --navy: #0D1B2A;
    --navy-mid: #162436;
    --navy-light: #1E3048;
    --slate: #2A4060;
    --text: #F0F4F8;
    --text-dim: #8BA0B8;
    --text-muted: #4A6480;
    --green: #2ECC71;
    --red: #E74C3C;
    --border: rgba(255,255,255,0.08);
    --radius: 12px;
  }
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--navy); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; overscroll-behavior: none; }

  .screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
  .screen.active { display: flex; }

  /* PIN */
  #screen-pin { align-items: center; justify-content: center; gap: 32px; padding: 24px; }
  .pin-logo { text-align: center; }
  .pin-logo .brand { font-size: 13px; letter-spacing: 0.2em; color: var(--gold); font-weight: 600; text-transform: uppercase; }
  .pin-logo h1 { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .pin-logo h1 span { color: var(--gold); }
  .pin-display { background: var(--navy-mid); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 32px; font-family: 'DM Mono', monospace; font-size: 32px; letter-spacing: 0.3em; text-align: center; min-width: 200px; color: var(--gold); transition: border-color 0.2s; }
  .pin-display.error { border-color: var(--red); color: var(--red); animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
  .pin-btn { background: var(--navy-light); border: 1.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 24px; font-weight: 600; height: 72px; cursor: pointer; transition: all 0.1s; }
  .pin-btn:active { background: var(--slate); transform: scale(0.95); }
  .pin-btn.clear { font-size: 14px; color: var(--text-dim); }
  .pin-btn.submit { background: var(--gold); color: var(--navy); border-color: var(--gold); }
  .pin-btn.submit:active { background: var(--gold-dark); }

  /* Header */
  .app-header { background: var(--navy-mid); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .back-btn { background: none; border: none; color: var(--gold); font-size: 22px; cursor: pointer; padding: 4px; line-height: 1; }
  .app-header h2 { font-size: 17px; font-weight: 600; flex: 1; }
  .user-badge { font-size: 12px; color: var(--text-dim); background: var(--slate); padding: 4px 10px; border-radius: 20px; }
  .logout-btn { background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; padding: 4px 8px; }

  /* Home */
  .home-body { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: -8px; }
  .big-btn { background: var(--navy-light); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: all 0.15s; text-align: left; width: 100%; }
  .big-btn:active { background: var(--slate); transform: scale(0.98); }
  .big-btn .icon { font-size: 28px; width: 48px; text-align: center; flex-shrink: 0; }
  .big-btn .label { font-size: 17px; font-weight: 600; color: var(--text); }
  .big-btn .sub { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .big-btn.primary { background: var(--gold); border-color: var(--gold); }
  .big-btn.primary .label { color: var(--navy); }
  .big-btn.primary .sub { color: var(--navy-mid); opacity: 0.75; }
  .big-btn.primary:active { background: var(--gold-dark); }

  /* Log form */
  .log-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .field-select, .field-input { background: var(--navy-light); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; padding: 14px 16px; width: 100%; appearance: none; outline: none; transition: border-color 0.15s; }
  .field-select:focus, .field-input:focus { border-color: var(--gold); }
  .field-select option { background: var(--navy-mid); }

  /* Item search */
  .search-wrap { position: relative; }
  .search-clear { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }
  .search-results { background: var(--navy-light); border: 1.5px solid var(--gold); border-radius: 10px; overflow: hidden; margin-top: 4px; max-height: 260px; overflow-y: auto; }
  .result-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .result-item:last-child { border-bottom: none; }
  .result-item:active { background: var(--slate); }
  .result-item .r-name { font-size: 15px; font-weight: 600; }
  .result-item .r-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .selected-item-box { background: rgba(232,160,32,0.1); border: 1.5px solid var(--gold); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .selected-item-box .s-name { font-size: 15px; font-weight: 600; color: var(--gold); }
  .selected-item-box .s-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .change-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-size: 12px; padding: 6px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

  /* Qty */
  .qty-row { display: flex; align-items: center; gap: 12px; }
  .qty-btn { background: var(--navy-light); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 22px; width: 52px; height: 52px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .qty-btn:active { background: var(--slate); }
  .qty-input { flex: 1; text-align: center; font-size: 28px; font-weight: 700; }

  /* Submit */
  .submit-btn { background: var(--gold); border: none; border-radius: var(--radius); color: var(--navy); font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700; padding: 18px; width: 100%; cursor: pointer; transition: all 0.15s; }
  .submit-btn:active { background: var(--gold-dark); transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* History */
  .history-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .tx-card { background: var(--navy-light); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .tx-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .tx-item-name { font-size: 15px; font-weight: 600; flex: 1; }
  .tx-qty { font-size: 15px; font-weight: 700; color: var(--gold); flex-shrink: 0; }
  .tx-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .tag { font-size: 11px; background: var(--slate); color: var(--text-dim); padding: 3px 8px; border-radius: 20px; }
  .tag.gold { background: rgba(232,160,32,0.15); color: var(--gold); }

  /* Utils */
  .loading { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: #fff; font-weight: 600; font-size: 14px; padding: 12px 24px; border-radius: 30px; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; pointer-events: none; }
  .toast.error { background: var(--red); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--slate); border-radius: 2px; }
</style>
</head>
<body>

<!-- PIN -->
<div id="screen-pin" class="screen active">
  <div class="pin-logo">
    <div class="brand">Northeastern Electric</div>
    <h1>NEE <span>Materials</span></h1>
  </div>
  <div class="pin-display" id="pin-display">_ _ _ _</div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn clear" onclick="pinClear()">Clear</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn submit" onclick="pinSubmit()">✓</button>
  </div>
</div>

<!-- HOME -->
<div id="screen-home" class="screen">
  <div class="app-header">
    <h2>NEE Materials</h2>
    <span class="user-badge" id="user-badge">—</span>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
  <div class="home-body">
    <div class="section-label">Actions</div>
    <button class="big-btn primary" onclick="goLog()">
      <div class="icon">📦</div>
      <div>
        <div class="label">Log Material Use</div>
        <div class="sub">Record items used on a job</div>
      </div>
    </button>
    <button class="big-btn" onclick="goHistory()">
      <div class="icon">📋</div>
      <div>
        <div class="label">My Recent Logs</div>
        <div class="sub">View your last 30 transactions</div>
      </div>
    </button>
  </div>
</div>

<!-- LOG -->
<div id="screen-log" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <h2>Log Material</h2>
  </div>
  <div class="log-body" id="log-body">
    <div class="loading"><div class="spinner"></div><br>Loading…</div>
  </div>
</div>

<!-- HISTORY -->
<div id="screen-history" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <h2>Recent Logs</h2>
  </div>
  <div class="history-body" id="history-body">
    <div class="loading"><div class="spinner"></div><br>Loading…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── API ────────────────────────────────────────────────────
const API = "/.netlify/functions/materials";

async function apiGet(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params });
  const r = await fetch(`${API}?${qs}`);
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || "API error");
  return d;
}

async function apiPost(body) {
  const r = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || "API error");
  return d;
}

// ── STATE ──────────────────────────────────────────────────
let currentUser = null;
let allJobs = [], allLocations = [], allItems = [];
let selectedItem = null;
let searchTimer = null;
let dataReady = false;

// ── PIN ────────────────────────────────────────────────────
let pinVal = "";
const pinEl = document.getElementById("pin-display");

function pinPress(d) {
  if (pinVal.length >= 4) return;
  pinVal += d;
  renderPin();
  if (pinVal.length === 4) setTimeout(pinSubmit, 150);
}
function pinClear() { pinVal = ""; renderPin(); pinEl.classList.remove("error"); }
function renderPin() {
  const filled = pinVal.split("").map(() => "●").join(" ");
  const empty  = Array(4 - pinVal.length).fill("_").join(" ");
  pinEl.textContent = [filled, empty].filter(Boolean).join(" ") || "_ _ _ _";
}

async function pinSubmit() {
  if (!pinVal) return;
  try {
    const d = await apiPost({ action: "login", pin: pinVal });
    currentUser = d.user;
    document.getElementById("user-badge").textContent = currentUser.name;
    showScreen("home");
    preload();
  } catch (e) {
    pinEl.classList.add("error");
    pinEl.textContent = "Wrong PIN";
    setTimeout(() => { pinEl.classList.remove("error"); pinVal = ""; renderPin(); }, 1200);
  }
}

function logout() {
  currentUser = null; pinVal = ""; renderPin();
  allJobs = []; allLocations = []; allItems = []; dataReady = false;
  showScreen("pin");
}

// ── PRELOAD ────────────────────────────────────────────────
async function preload() {
  try {
    const [jd, ld, id] = await Promise.all([
      apiGet("jobs"),
      apiGet("locations"),
      apiGet("items")
    ]);
    allJobs      = jd.jobs;
    allLocations = ld.locations;
    allItems     = id.items;
    dataReady    = true;
  } catch (e) {
    console.error("Preload failed:", e);
  }
}

// ── SCREENS ────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");
}
function goHome() { showScreen("home"); }

// ── LOG SCREEN ─────────────────────────────────────────────
function goLog() {
  selectedItem = null;
  showScreen("log");
  renderLogForm();
}

function renderLogForm() {
  const body = document.getElementById("log-body");
  if (!dataReady) {
    body.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading data…</div>';
    setTimeout(renderLogForm, 600);
    return;
  }
  body.innerHTML = `
    <div class="field-group">
      <div class="field-label">Job</div>
      <select class="field-select" id="sel-job">
        <option value="">— Select a job —</option>
        ${allJobs.map(j => `<option value="${j.id}">${j.name}</option>`).join("")}
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">From Location</div>
      <select class="field-select" id="sel-loc">
        <option value="">— Select location —</option>
        ${allLocations.map(l => `<option value="${l.id}">${l.name}</option>`).join("")}
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">Item</div>
      <div id="item-area">
        <div class="search-wrap">
          <input class="field-input" id="item-search" type="text" placeholder="Type to search items…" autocomplete="off" oninput="onSearch()" />
          <button class="search-clear" onclick="clearItem()">×</button>
        </div>
        <div id="search-drop"></div>
      </div>
    </div>
    <div class="field-group" id="qty-group" style="display:none">
      <div class="field-label">Quantity</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="adjQty(-1)">−</button>
        <input class="field-input qty-input" id="qty-input" type="number" value="1" min="0.01" step="0.01" />
        <button class="qty-btn" onclick="adjQty(1)">+</button>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label">Notes (optional)</div>
      <input class="field-input" id="tx-notes" type="text" placeholder="e.g. 2nd floor panel" />
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitLog()" disabled>Log Material</button>
    <div style="height:24px"></div>
  `;
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = (document.getElementById("item-search")?.value || "").trim().toLowerCase();
    const drop = document.getElementById("search-drop");
    if (!drop) return;
    if (!q) { drop.innerHTML = ""; return; }
    const hits = allItems.filter(i => i.name.toLowerCase().includes(q)).slice(0, 8);
    if (!hits.length) { drop.innerHTML = '<div class="search-results"><div class="empty" style="padding:12px">No items found</div></div>'; return; }
    drop.innerHTML = `<div class="search-results">${hits.map(i =>
      `<div class="result-item" onclick="pickItem('${i.id}')">
        <div class="r-name">${i.name}</div>
        <div class="r-meta">${[i.cat, i.uom, i.cost ? "$" + i.cost.toFixed(2) : ""].filter(Boolean).join(" · ")}</div>
      </div>`).join("")}</div>`;
  }, 150);
}

function pickItem(id) {
  selectedItem = allItems.find(i => i.id === id);
  if (!selectedItem) return;
  document.getElementById("item-area").innerHTML = `
    <div class="selected-item-box">
      <div>
        <div class="s-name">${selectedItem.name}</div>
        <div class="s-meta">${[selectedItem.cat, selectedItem.uom].filter(Boolean).join(" · ")}</div>
      </div>
      <button class="change-btn" onclick="clearItem()">Change</button>
    </div>`;
  document.getElementById("qty-group").style.display = "block";
  document.getElementById("submit-btn").disabled = false;
}

function clearItem() {
  selectedItem = null;
  document.getElementById("item-area").innerHTML = `
    <div class="search-wrap">
      <input class="field-input" id="item-search" type="text" placeholder="Type to search items…" autocomplete="off" oninput="onSearch()" />
      <button class="search-clear" onclick="clearItem()">×</button>
    </div>
    <div id="search-drop"></div>`;
  document.getElementById("qty-group").style.display = "none";
  document.getElementById("submit-btn").disabled = true;
  setTimeout(() => document.getElementById("item-search")?.focus(), 50);
}

function adjQty(delta) {
  const el = document.getElementById("qty-input");
  el.value = Math.max(0.01, +(parseFloat(el.value || 1) + delta).toFixed(2));
}

async function submitLog() {
  const jobId   = document.getElementById("sel-job")?.value;
  const locId   = document.getElementById("sel-loc")?.value;
  const qty     = parseFloat(document.getElementById("qty-input")?.value);
  const notes   = document.getElementById("tx-notes")?.value.trim();

  if (!jobId)        { showToast("Please select a job", true); return; }
  if (!locId)        { showToast("Please select a location", true); return; }
  if (!selectedItem) { showToast("Please select an item", true); return; }
  if (!qty || qty <= 0) { showToast("Quantity must be greater than 0", true); return; }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Saving…";

  try {
    await apiPost({
      action:     "logTransaction",
      itemId:     selectedItem.id,
      locationId: locId,
      quantity:   qty,
      enteredBy:  currentUser.name,
      notes:      notes || undefined
    });
    showToast("✓ Material logged!");
    goHome();
  } catch (e) {
    showToast("Error: " + e.message, true);
    btn.disabled = false;
    btn.textContent = "Log Material";
  }
}

// ── HISTORY ────────────────────────────────────────────────
async function goHistory() {
  showScreen("history");
  const body = document.getElementById("history-body");
  body.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading…</div>';
  try {
    const d = await apiGet("history", { enteredBy: currentUser.name });
    if (!d.transactions.length) {
      body.innerHTML = '<div class="empty">No transactions logged yet.</div>';
      return;
    }
    body.innerHTML = d.transactions.map(tx => {
      const date = tx.date
        ? new Date(tx.date + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" })
        : "—";
      return `
        <div class="tx-card">
          <div class="tx-top">
            <div class="tx-item-name">${tx.item || "—"}</div>
            <div class="tx-qty">×${tx.qty}</div>
          </div>
          <div class="tx-tags">
            <span class="tag gold">${tx.type || "—"}</span>
            <span class="tag">${tx.location || "—"}</span>
            <span class="tag">${date}</span>
            ${tx.notes ? `<span class="tag">${tx.notes}</span>` : ""}
          </div>
        </div>`;
    }).join("");
  } catch (e) {
    body.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

// ── TOAST ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isError ? " error" : "");
  clearTimeout(toastTimer);
  requestAnimationFrame(() => t.classList.add("show"));
  toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}
</script>
</body>
</html>
